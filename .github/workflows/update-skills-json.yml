name: Update skills.json in developers

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  update-skills-json:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Generate skills.json
        run: bun run scripts/build-skills-json.ts --output skills.json

      - name: Push skills.json and open PR in developers
        env:
          GH_TOKEN: ${{ secrets.DEVELOPERS_DISPATCH_TOKEN }}
          SKILLS_SHA: ${{ github.sha }}
        run: |
          TARGET_REPO="longbridge/developers"
          TARGET_FILE="skills.json"
          BRANCH="auto/update-skills-json-${SKILLS_SHA:0:8}"

          # Clone developers repo
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" \
            /tmp/developers

          # Copy generated file
          cp skills.json "/tmp/developers/${TARGET_FILE}"

          cd /tmp/developers

          # Skip if nothing changed
          if git diff --quiet; then
            echo "skills.json is already up to date"
            exit 0
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git checkout -b "${BRANCH}"
          git add "${TARGET_FILE}"
          git commit -m "chore: update skills.json from skills@${SKILLS_SHA:0:8}"
          git push origin "${BRANCH}"

          # Create PR (skip if one already exists for this branch)
          gh pr create \
            --repo "${TARGET_REPO}" \
            --title "chore: update skills.json ($(date +%Y-%m-%d))" \
            --body "Auto-generated by skills repo CI.

Source commit: longbridge/skills@${SKILLS_SHA}

Updates \`${TARGET_FILE}\` with the latest skill list extracted from all \`SKILL.md\` frontmatter files." \
            --base main \
            --head "${BRANCH}" \
            || echo "PR may already exist, skipping"
