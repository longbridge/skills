name: Notify skill updated

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger developers skill pack
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEVELOPERS_DISPATCH_TOKEN }}
          repository: longbridge/developers
          event-type: skill-updated
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref_name }}"
            }
